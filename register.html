<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen">

<div class="bg-zinc-900 p-8 rounded-xl w-80 text-white">

<h2 class="text-xl mb-4 text-center">Register</h2>

<input type="text" placeholder="Name" class="w-full p-2 mb-3 text-black">

<input type="email" placeholder="Email" class="w-full p-2 mb-3 text-black">

<input type="password" placeholder="Password" class="w-full p-2 mb-3 text-black">

<button onclick="register()" class="w-full bg-cyan-400 text-black p-2 rounded">Register</button>

<p class="mt-3 text-sm text-center">
<a href="login.html" class="text-cyan-400">Already have account? Login</a>
</p>

</div>

<script>

function register(){

alert("Account Created");

window.location.href="login.html";

}

</script>

</body>
</html>
