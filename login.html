<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen">

<div class="bg-zinc-900 p-8 rounded-xl w-80 text-white">

<h2 class="text-xl mb-4 text-center">Login</h2>

<input id="email" type="email" placeholder="Email" class="w-full p-2 mb-3 text-black">

<input id="password" type="password" placeholder="Password" class="w-full p-2 mb-3 text-black">

<button onclick="login()" class="w-full bg-cyan-400 text-black p-2 rounded">Login</button>

<p class="mt-3 text-sm text-center">
<a href="register.html" class="text-cyan-400">Register</a>
</p>

<p class="text-sm text-center">
<a href="forgot.html" class="text-cyan-400">Forgot Password?</a>
</p>

</div>

<script>

function login(){

localStorage.setItem("isLoggedIn","true");

window.location.href="index.html";

}

</script>

</body>
</html>
