<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VisionAR Pro - Extreme Particles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>
    <style>
        /* [EXISTING STYLE FROM VISIONAR PRO - NO CHANGES MADE] */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; touch-action: manipulation; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; background: #020205; }
        .glass-panel { background: rgba(10, 10, 15, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        #video-container { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; transition: filter 0.5s ease; }
        canvas#output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; transform: scaleX(-1); }
        .filter-none video { filter: contrast(1) brightness(1); }
        .filter-glitch video { filter: contrast(1.5) saturate(2.2) brightness(0.85); }
        .filter-noir video { filter: grayscale(1) contrast(2.2) brightness(0.75); }
        .filter-gold video { filter: sepia(0.8) contrast(1.5) brightness(1.1) saturate(2); }
        .filter-cyber video { filter: contrast(1.7) brightness(0.75) hue-rotate(285deg) saturate(2.8); }
        #gesture-timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 55; font-size: 10rem; font-weight: 900; color: white; text-shadow: 0 0 60px rgba(34, 211, 238, 0.8); pointer-events: none; opacity: 0; transition: opacity 0.2s, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translate(-50%, -50%) scale(0.5); }
        #gesture-timer.active { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .hud-bracket { position: absolute; width: 30px; height: 30px; border: 1.5px solid rgba(34, 211, 238, 0.4); z-index: 30; pointer-events: none; }
        .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .top-right { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }
        .active-ring { outline: 2px solid #22d3ee; background: rgba(34, 211, 238, 0.2) !important; box-shadow: 0 0 20px rgba(34, 211, 238, 0.5); }
        #flash { position: absolute; inset: 0; background: white; z-index: 100; opacity: 0; pointer-events: none; }
        .flash-anim { animation: flash-effect 0.4s ease-out; }
        @keyframes flash-effect { 0% { opacity: 1; } 100% { opacity: 0; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glow-text { text-shadow: 0 0 10px rgba(34, 211, 238, 0.6); }
        @keyframes slideInUp { from { transform: translate(-50%, 100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        .gesture-prompt { animation: slideInUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-zinc-100 min-h-screen overflow-x-hidden select-none">
    <!-- [EXISTING BODY AND SCRIPT FROM VISIONAR PRO - NO CHANGES MADE] -->
    <div id="flash"></div>
    <div id="gesture-timer"></div>
    <div id="gesture-notif" class="fixed top-24 left-1/2 -translate-x-1/2 z-[70] hidden gesture-prompt">
        <div class="glass-panel px-6 py-3 rounded-2xl flex items-center gap-4 border border-cyan-400/30 shadow-[0_0_30px_rgba(34,211,238,0.2)]">
            <div class="relative w-8 h-8">
                <svg class="w-full h-full -rotate-90" viewBox="0 0 36 36">
                    <circle cx="18" cy="18" r="16" fill="none" class="stroke-zinc-800" stroke-width="3"></circle>
                    <circle id="notif-progress" cx="18" cy="18" r="16" fill="none" class="stroke-cyan-400" stroke-width="3" stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round"></circle>
                </svg>
            </div>
            <div class="flex flex-col">
                <span class="text-[10px] font-black tracking-[0.2em] text-cyan-400 uppercase leading-none">Gesture Detected</span>
                <span class="text-[9px] font-bold text-zinc-400 uppercase mt-1">Holding for capture...</span>
            </div>
        </div>
    </div>

    <header class="p-4 md:px-10 md:py-6 flex justify-between items-center z-50 relative">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 md:w-12 md:h-12 bg-zinc-900 rounded-xl flex items-center justify-center border border-white/10 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 md:w-6 md:h-6 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </div>
            <div>
                <h1 class="text-lg md:text-xl font-medium tracking-tight uppercase italic leading-none">Vision<span class="text-cyan-400 font-bold not-italic">AR</span></h1>
                <p class="text-[8px] md:text-[9px] text-zinc-500 uppercase tracking-[0.2em] font-bold mt-1">SUPERNOVA ENGINE v8.0</p>
            </div>
        </div>
        <button id="logoutBtn" class="px-3 py-1.5 md:px-4 md:py-2 rounded-xl glass-panel text-[8px] md:text-[10px] font-bold tracking-widest hover:bg-white/10">LOGOUT</button>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
            <div class="lg:col-span-8 space-y-6">
                <div id="ar-viewport-container" class="relative aspect-video rounded-3xl md:rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/5 bg-zinc-950 filter-none">
                    <div id="loading-overlay" class="absolute inset-0 z-[60] flex flex-col items-center justify-center bg-[#020205] transition-opacity duration-700">
                        <div class="relative w-16 h-16">
                            <div class="absolute inset-0 border-4 border-cyan-500/20 rounded-full"></div>
                            <div class="absolute inset-0 border-4 border-t-cyan-400 rounded-full animate-spin"></div>
                        </div>
                        <p id="loading-msg" class="text-[10px] text-cyan-400 uppercase tracking-[0.4em] mt-6 font-bold glow-text">Igniting 6,000 Nodes</p>
                    </div>
                    <div id="video-container">
                        <div class="hud-bracket top-left"></div><div class="hud-bracket top-right"></div>
                        <div class="hud-bracket bottom-left"></div><div class="hud-bracket bottom-right"></div>
                        <div class="absolute bottom-6 md:bottom-10 left-1/2 -translate-x-1/2 z-40">
                            <button onclick="takePhoto()" class="shutter-btn w-16 h-16 md:w-20 md:h-20 rounded-full border-4 border-white/40 flex items-center justify-center bg-white/10 backdrop-blur-xl group">
                                <div class="w-12 h-12 md:w-14 md:h-14 rounded-full bg-white shadow-xl group-active:scale-90 transition-transform"></div>
                            </button>
                        </div>
                        <div id="last-photo-preview" class="absolute bottom-6 md:bottom-10 left-6 md:left-10 z-40 hidden">
                            <a id="download-link" download="vision-ar-snap.png">
                                <div class="w-14 h-14 md:w-16 md:h-16 rounded-2xl border-2 border-white/30 overflow-hidden glass-panel shadow-2xl">
                                    <img id="preview-img" class="w-full h-full object-cover" />
                                </div>
                            </a>
                        </div>
                        <video id="webcam" autoplay playsinline muted></video>
                        <canvas id="output_canvas"></canvas>
                    </div>
                </div>
                <div class="style-grid flex overflow-x-auto gap-4 pb-2 no-scrollbar px-1">
                    <button onclick="changeStyle('aviator')" id="btn-aviator" class="glass-panel min-w-[120px] p-4 rounded-3xl flex flex-col items-center gap-2 active-ring transition-all">
                        <span class="text-2xl">🕶️</span>
                        <span class="text-[9px] font-black uppercase tracking-widest">Aviator</span>
                    </button>
                    <button onclick="changeStyle('modern')" id="btn-modern" class="glass-panel min-w-[120px] p-4 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <span class="text-2xl">👓</span>
                        <span class="text-[9px] font-black uppercase tracking-widest">Modern</span>
                    </button>
                    <button onclick="changeStyle('goldtotem')" id="btn-goldtotem" class="glass-panel min-w-[120px] p-4 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <span class="text-2xl">🎭</span>
                        <span class="text-[9px] font-black uppercase tracking-widest">Gold Totem</span>
                    </button>
                    <button onclick="changeStyle('silveroni')" id="btn-silveroni" class="glass-panel min-w-[120px] p-4 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <span class="text-2xl">👹</span>
                        <span class="text-[9px] font-black uppercase tracking-widest">Silver Oni</span>
                    </button>
                    <button onclick="changeStyle('none')" id="btn-none" class="glass-panel min-w-[120px] p-4 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <span class="text-2xl">❌</span>
                        <span class="text-[9px] font-black uppercase tracking-widest">Style Off</span>
                    </button>
                </div>
            </div>
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-6 rounded-[2rem] md:rounded-[2.5rem] space-y-8">
                    <div>
                        <h3 class="text-white font-bold text-[10px] uppercase tracking-[0.3em] mb-5 opacity-60">Neural Visualization</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="setFilter('glitch')" id="filter-btn-glitch" class="col-span-2 p-6 rounded-xl bg-cyan-500/20 border border-cyan-500/40 text-[12px] font-black uppercase tracking-[0.25em] flex items-center justify-center gap-3 shadow-[0_0_30px_rgba(34,211,238,0.35)] animate-pulse">
                                <span>🎆</span> SUPERNOVA PARTICLES
                            </button>
                            <button onclick="setFilter('none')" id="filter-btn-none" class="p-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-bold uppercase active-ring">Natural</button>
                            <button onclick="setFilter('gold')" id="filter-btn-gold" class="p-3 rounded-xl bg-yellow-500/10 border border-yellow-500/20 text-[9px] font-bold uppercase text-yellow-400">Sun King</button>
                            <button onclick="setFilter('cyber')" id="filter-btn-cyber" class="p-3 rounded-xl bg-purple-500/10 border border-purple-500/20 text-[9px] font-bold uppercase text-purple-400">Glitch 86</button>
                            <button onclick="setFilter('noir')" id="filter-btn-noir" class="p-3 rounded-xl bg-zinc-500/10 border border-zinc-500/20 text-[9px] font-bold uppercase text-zinc-400">Deep Noir</button>
                        </div>
                    </div>
                    <div class="p-6 rounded-2xl bg-cyan-500/10 border border-cyan-500/20 space-y-4 shadow-inner">
                        <div class="flex items-center gap-3">
                            <span class="text-xl">✋</span>
                            <h4 class="text-[10px] font-black uppercase text-cyan-400 tracking-[0.2em]">Gesture Control</h4>
                        </div>
                        <p class="text-[10px] text-zinc-400 leading-relaxed font-medium">Show an <b>Open Palm</b> to trigger a 3-second countdown.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        /* [EXISTING MODULE LOGIC FROM VISIONAR PRO - NO CHANGES EXCEPT LOGOUT] */
        import { FaceLandmarker, GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
        const CONFIG = { faceModel: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", gestureModel: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task", wasm: "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm" };
        let faceLandmarker, gestureRecognizer, scene, camera, renderer, arGroup, particleSystem;
        let activeStyle = 'aviator', activeFilter = 'none', isCapturing = false;
        const video = document.getElementById("webcam"), canvas = document.getElementById("output_canvas"), loadingOverlay = document.getElementById("loading-overlay"), gestureTimer = document.getElementById("gesture-timer"), gestureNotif = document.getElementById("gesture-notif"), notifProgress = document.getElementById("notif-progress");
        
        async function init() {
            if (!localStorage.getItem('isLoggedIn')) { window.location.href = 'login.html'; return; }
            try { setupThreeJS(); const vision = await FilesetResolver.forVisionTasks(CONFIG.wasm); [faceLandmarker, gestureRecognizer] = await Promise.all([ FaceLandmarker.createFromOptions(vision, { baseOptions: { modelAssetPath: CONFIG.faceModel, delegate: "GPU" }, runningMode: "VIDEO", outputFaceBlendshapes: false }), GestureRecognizer.createFromOptions(vision, { baseOptions: { modelAssetPath: CONFIG.gestureModel, delegate: "GPU" }, runningMode: "VIDEO" }) ]); await startCamera(); } catch (err) { console.error(err); }
        }
        function setupThreeJS() { scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(45, 1280/720, 0.1, 100); camera.position.z = 5; renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, preserveDrawingBuffer: true }); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); scene.add(new THREE.AmbientLight(0xffffff, 1.5)); const light = new THREE.PointLight(0xffffff, 2.5); light.position.set(2, 2, 5); scene.add(light); arGroup = new THREE.Group(); scene.add(arGroup); createParticles(); createARObject(); }
        function createParticles() { const pC = 6000; const geo = new THREE.BufferGeometry(); const pos = new Float32Array(pC * 3); const sz = new Float32Array(pC); for (let i = 0; i < pC; i++) { pos[i*3] = (Math.random() - 0.5) * 15; pos[i*3+1] = (Math.random() - 0.5) * 15; pos[i*3+2] = (Math.random() - 0.5) * 15; sz[i] = Math.random(); } geo.setAttribute('position', new THREE.BufferAttribute(pos, 3)); geo.setAttribute('size', new THREE.BufferAttribute(sz, 1)); const mat = new THREE.PointsMaterial({ size: 0.02, color: 0x22d3ee, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending, sizeAttenuation: true }); particleSystem = new THREE.Points(geo, mat); scene.add(particleSystem); particleSystem.visible = false; }
        function createARObject() { arGroup.children = []; if (activeStyle === 'none') return; const gp = new THREE.Group(); if (activeStyle === 'aviator') { const gold = new THREE.MeshPhongMaterial({ color: 0xD4AF37, shininess: 400 }); const lens = new THREE.MeshPhongMaterial({ color: 0x050505, transparent: true, opacity: 0.95 }); [-0.38, 0.38].forEach(x => { const rim = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.012, 16, 64), gold); rim.position.set(x, 0, 0.2); const l = new THREE.Mesh(new THREE.CircleGeometry(0.3, 32), lens); l.position.set(x, 0, 0.21); gp.add(rim, l); }); } else if (activeStyle === 'modern') { const bl = new THREE.MeshPhongMaterial({ color: 0x010101 }); [-0.35, 0.35].forEach(x => { const rim = new THREE.Mesh(new THREE.BoxGeometry(0.58, 0.42, 0.12), bl); rim.position.set(x, 0, 0.2); gp.add(rim); }); } else if (activeStyle === 'goldtotem') { const m = new THREE.MeshPhongMaterial({ color: 0xFFD700 }); const mk = new THREE.Mesh(new THREE.SphereGeometry(0.72, 32, 16, 0, Math.PI*2, 0, Math.PI/1.3), m); mk.scale.set(1, 1.4, 0.9); mk.position.y = -0.12; gp.add(mk); } else if (activeStyle === 'silveroni') { const m = new THREE.MeshPhongMaterial({ color: 0xffffff }); const mk = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 16, 0, Math.PI*2, 0, Math.PI/1.2), m); mk.scale.set(1, 1.45, 0.88); gp.add(mk); } arGroup.add(gp); }
        async function startCamera() { try { const s = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } }); video.srcObject = s; video.onloadedmetadata = () => { video.play(); loadingOverlay.style.opacity = '0'; setTimeout(() => loadingOverlay.style.display = 'none', 700); resize(); requestAnimationFrame(renderLoop); }; } catch (e) { } }
        function updateParticles(lms) { if (activeFilter !== 'glitch') { particleSystem.visible = false; return; } particleSystem.visible = true; const pos = particleSystem.geometry.attributes.position.array; const time = performance.now() * 0.005; for (let i = 0; i < 6000; i++) { const l = lms[i % lms.length]; const tx = (l.x - 0.5) * 8.4; const ty = -(l.y - 0.5) * 6.4; const tz = (l.z * -10.8); pos[i*3] += (tx - pos[i*3]) * 0.18; pos[i*3+1] += (ty - pos[i*3+1]) * 0.18; pos[i*3+2] += (tz - pos[i*3+2]) * 0.18; } particleSystem.geometry.attributes.position.needsUpdate = true; }
        function renderLoop() { const now = performance.now(); if (video.readyState >= 2) { const f = faceLandmarker.detectForVideo(video, now); if (f.faceLandmarks?.[0]) { const head = f.faceLandmarks[0]; const b = head[168]; arGroup.position.set((b.x - 0.5) * 8, -(b.y - 0.5) * 6, b.z * -10); updateParticles(head); arGroup.visible = true; } else { arGroup.visible = false; particleSystem.visible = false; } if (!isCapturing) { const g = gestureRecognizer.recognizeForVideo(video, now); if (g.gestures?.[0]?.[0]?.categoryName === "Open_Palm" && g.gestures[0][0].score > 0.8) startCountdown(); } renderer.render(scene, camera); } requestAnimationFrame(renderLoop); }
        function startCountdown() { isCapturing = true; let count = 3; gestureNotif.classList.remove('hidden'); gestureTimer.innerText = count; gestureTimer.classList.add('active'); notifProgress.style.transition = 'stroke-dashoffset 3s linear'; notifProgress.style.strokeDashoffset = '0'; const int = setInterval(() => { count--; if (count > 0) { gestureTimer.innerText = count; } else { clearInterval(int); gestureTimer.classList.remove('active'); gestureNotif.classList.add('hidden'); takePhoto(); setTimeout(() => { isCapturing = false; }, 3000); } }, 1000); }
        window.takePhoto = () => { document.getElementById('flash').classList.add('flash-anim'); setTimeout(() => document.getElementById('flash').classList.remove('flash-anim'), 400); const shot = document.createElement('canvas'); shot.width = video.videoWidth; shot.height = video.videoHeight; const ctx = shot.getContext('2d'); ctx.save(); ctx.translate(shot.width, 0); ctx.scale(-1, 1); ctx.drawImage(video, 0, 0); ctx.restore(); ctx.drawImage(canvas, 0, 0, shot.width, shot.height); const url = shot.toDataURL('image/png'); document.getElementById('last-photo-preview').classList.remove('hidden'); document.getElementById('preview-img').src = url; document.getElementById('download-link').href = url; };
        window.setFilter = (f) => { activeFilter = f; document.getElementById('ar-viewport-container').className = `relative aspect-video rounded-3xl md:rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/5 bg-zinc-950 filter-${f}`; };
        window.changeStyle = (s) => { activeStyle = s; createARObject(); };
        function resize() { const c = document.getElementById('ar-viewport-container'); if (!c) return; renderer.setSize(c.clientWidth, c.clientHeight); camera.aspect = c.clientWidth / c.clientHeight; camera.updateProjectionMatrix(); }
        document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('isLoggedIn'); window.location.href = 'login.html'; };
        window.addEventListener('resize', resize);
        window.addEventListener('load', init);
    </script>
</body>
</html>
