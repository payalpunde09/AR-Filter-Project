<!-- ONLY IMPORTANT SCRIPT PART UPDATED - UI SAME -->

<script type="module">
import { FaceLandmarker, GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

const CONFIG = {
    faceModel: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
    gestureModel: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
    wasm: "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
};

let faceLandmarker, gestureRecognizer;
let scene, camera, renderer, arGroup, particleSystem;

let activeStyle = 'aviator';
let activeFilter = 'none';

let isCapturing = false;
let isCountingDown = false;

const video = document.getElementById("webcam");
const canvas = document.getElementById("output_canvas");
const gestureTimer = document.getElementById("gesture-timer");
const gestureNotif = document.getElementById("gesture-notif");
const notifProgress = document.getElementById("notif-progress");

async function init() {
    const vision = await FilesetResolver.forVisionTasks(CONFIG.wasm);

    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: CONFIG.faceModel, delegate: "GPU" },
        runningMode: "VIDEO"
    });

    gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
        baseOptions: { modelAssetPath: CONFIG.gestureModel, delegate: "GPU" },
        runningMode: "VIDEO"
    });

    await startCamera();
}

async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" }
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
        video.play();
        requestAnimationFrame(renderLoop);
    };
}

function renderLoop() {
    const now = performance.now();

    if (video.readyState >= 2) {

        // 👉 GESTURE DETECTION FIXED
        if (!isCapturing && !isCountingDown) {

            const g = gestureRecognizer.recognizeForVideo(video, now);
            const gesture = g.gestures?.[0]?.[0];

            if (gesture) {
                console.log("Gesture:", gesture.categoryName, gesture.score);
            }

            if (
                gesture &&
                gesture.categoryName === "Open_Palm" &&
                gesture.score > 0.6
            ) {
                startCountdown();
            }
        }
    }

    requestAnimationFrame(renderLoop);
}

// 👉 COUNTDOWN FIXED
function startCountdown() {
    if (isCountingDown) return;

    isCountingDown = true;
    isCapturing = true;

    let count = 3;

    gestureNotif.classList.remove('hidden');
    gestureTimer.innerText = count;
    gestureTimer.classList.add('active');

    notifProgress.style.transition = 'none';
    notifProgress.style.strokeDashoffset = '100';

    setTimeout(() => {
        notifProgress.style.transition = 'stroke-dashoffset 3s linear';
        notifProgress.style.strokeDashoffset = '0';
    }, 50);

    const interval = setInterval(() => {
        count--;

        if (count > 0) {
            gestureTimer.innerText = count;
        } else {
            clearInterval(interval);

            gestureTimer.classList.remove('active');
            gestureNotif.classList.add('hidden');

            takePhoto();

            setTimeout(() => {
                isCapturing = false;
                isCountingDown = false;
            }, 3000);
        }
    }, 1000);
}

// 👉 PHOTO FUNCTION
window.takePhoto = () => {
    const shot = document.createElement('canvas');
    shot.width = video.videoWidth;
    shot.height = video.videoHeight;

    const ctx = shot.getContext('2d');

    ctx.save();
    ctx.translate(shot.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0);
    ctx.restore();

    const url = shot.toDataURL('image/png');
    console.log("Photo captured");
};

window.addEventListener('load', init);
</script>
