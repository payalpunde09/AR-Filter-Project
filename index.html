<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionAR Pro - Advanced Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap');
        
        body { font-family: 'Space Grotesk', sans-serif; }

        .glass-panel { 
            background: rgba(10, 10, 15, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        #video-container { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; filter: contrast(1.1) brightness(0.95); transition: filter 0.5s ease; }
        
        canvas#output_canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 20; 
            pointer-events: none;
            transform: scaleX(-1);
        }

        /* Filter Styles */
        #filter-overlay { position: absolute; inset: 0; z-index: 25; pointer-events: none; mix-blend-mode: overlay; transition: all 0.5s ease; }
        
        .filter-cyber video { filter: contrast(1.5) brightness(0.8) hue-rotate(280deg) saturate(2); }
        .filter-cyber #filter-overlay { background: linear-gradient(45deg, rgba(255,0,255,0.2), rgba(0,255,255,0.2)); mix-blend-mode: screen; }
        
        .filter-noir video { filter: grayscale(1) contrast(1.8) brightness(0.9); }
        .filter-noir #filter-overlay { background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.5) 100%); }
        
        .filter-glow video { filter: brightness(1.1) saturate(1.2) sepia(0.2) blur(0.5px); }
        .filter-glow #filter-overlay { background: rgba(255, 200, 100, 0.1); backdrop-filter: brightness(1.1); }

        .filter-pokkie video { filter: saturate(1.4) sepia(0.3) brightness(1.05) contrast(0.9) blur(0.3px); }
        .filter-pokkie #filter-overlay { 
            background: linear-gradient(to bottom, rgba(255, 180, 150, 0.15), rgba(255, 100, 200, 0.05)); 
            mix-blend-mode: soft-light;
            backdrop-filter: contrast(1.1);
        }

        #gesture-timer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 55; font-size: 8rem; font-weight: 900; color: white;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.8); pointer-events: none;
            opacity: 0; transition: opacity 0.2s;
        }

        .hud-bracket { position: absolute; width: 30px; height: 30px; border: 1px solid rgba(59, 130, 246, 0.4); z-index: 30; pointer-events: none; transition: all 0.3s ease; }
        .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .top-right { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        .targeting .hud-bracket { border-color: #fbbf24; width: 50px; height: 50px; border-width: 2px; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }

        .active-ring { 
            outline: 2px solid #3b82f6; 
            background: rgba(59, 130, 246, 0.1) !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        #flash { position: absolute; inset: 0; background: white; z-index: 100; opacity: 0; pointer-events: none; }
        .flash-anim { animation: flash-effect 0.4s ease-out; }
        @keyframes flash-effect { 0% { opacity: 0.8; } 100% { opacity: 0; } }

        .shutter-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .shutter-btn:active { transform: scale(0.9) translateY(2px); }

        .style-grid::-webkit-scrollbar { height: 4px; }
        .style-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020205] text-zinc-100 min-h-screen overflow-x-hidden">

    <div id="flash"></div>
    <div id="gesture-timer"></div>

    <header class="p-4 md:px-10 md:py-8 flex justify-between items-center z-50 relative">
        <div class="flex items-center gap-4">
            <div class="relative w-12 h-12 bg-zinc-900 rounded-xl flex items-center justify-center border border-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-medium tracking-tight uppercase italic">Vision<span class="text-blue-500 font-bold not-italic">AR</span></h1>
                <p class="text-[9px] text-zinc-500 uppercase tracking-[0.2em] font-bold">Neural Engine v2.0</p>
            </div>
        </div>
        <div id="status-badge" class="flex items-center gap-2.5 px-4 py-2 rounded-full glass-panel text-[10px] font-bold tracking-widest">
            <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></div> SYSTEM READY
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-10">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-8 space-y-8">
                <div id="ar-viewport-container" class="relative aspect-video rounded-[2.5rem] overflow-hidden shadow-[0_0_80px_rgba(0,0,0,0.5)] border border-white/5 bg-zinc-950 group">
                    <div id="loading-overlay" class="absolute inset-0 z-[60] flex flex-col items-center justify-center bg-[#020205] transition-opacity duration-500 px-6 text-center">
                        <div id="loader-icon" class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500 mb-4"></div>
                        <p id="loading-msg" class="text-[10px] text-blue-500 uppercase tracking-[0.3em]">Booting Neural Core</p>
                        <button id="retry-btn" onclick="location.reload()" class="hidden mt-6 px-6 py-2 bg-zinc-800 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-zinc-700 transition-colors">Retry Connection</button>
                    </div>

                    <div id="video-container">
                        <div id="filter-overlay"></div>
                        <div class="hud-bracket top-left"></div><div class="hud-bracket top-right"></div>
                        <div class="hud-bracket bottom-left"></div><div class="hud-bracket bottom-right"></div>
                        
                        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-40">
                            <button onclick="takePhoto()" class="shutter-btn w-16 h-16 rounded-full border-4 border-white/30 flex items-center justify-center bg-white/10 backdrop-blur-md">
                                <div class="w-10 h-10 rounded-full bg-white shadow-[0_0_15px_rgba(255,255,255,0.5)]"></div>
                            </button>
                        </div>

                        <div id="last-photo-preview" class="absolute bottom-8 left-8 z-40 hidden">
                            <a id="download-link" download="vision-ar-snap.png">
                                <div class="w-14 h-14 rounded-xl border-2 border-white/20 overflow-hidden glass-panel">
                                    <img id="preview-img" class="w-full h-full object-cover" />
                                </div>
                            </a>
                        </div>
                        
                        <video id="webcam" autoplay playsinline></video>
                        <canvas id="output_canvas"></canvas>
                    </div>
                </div>

                <div class="style-grid flex overflow-x-auto gap-4 pb-4 px-2">
                    <button id="btn-aviator" onclick="changeStyle('aviator')" class="glass-panel min-w-[120px] p-4 rounded-3xl flex flex-col items-center gap-2 active-ring transition-all">
                        <span class="text-xl">🕶️</span>
                        <span class="text-[9px] font-bold uppercase tracking-tight">Aviator</span>
                    </button>
                    <button id="btn-wayfarer" onclick="changeStyle('wayfarer')" class="glass-panel min-w-[120px] p-4 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <span class="text-xl">👓</span>
                        <span class="text-[9px] font-bold uppercase tracking-tight">Wayfarer</span>
                    </button>
                    <button id="btn-retro" onclick="changeStyle('retro')" class="glass-panel min-w-[120px] p-4 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <span class="text-xl">🧐</span>
                        <span class="text-[9px] font-bold uppercase tracking-tight">Retro</span>
                    </button>
                    <button id="btn-sport" onclick="changeStyle('sport')" class="glass-panel min-w-[120px] p-4 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <span class="text-xl">🥽</span>
                        <span class="text-[9px] font-bold uppercase tracking-tight">Active</span>
                    </button>
                    <button id="btn-cat" onclick="changeStyle('cat')" class="glass-panel min-w-[120px] p-4 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <span class="text-xl">🐱</span>
                        <span class="text-[9px] font-bold uppercase tracking-tight">Cat Eye</span>
                    </button>
                    <button id="btn-none" onclick="changeStyle('none')" class="glass-panel min-w-[120px] p-4 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <span class="text-xl">❌</span>
                        <span class="text-[9px] font-bold uppercase tracking-tight">None</span>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-6 rounded-[2.5rem] space-y-6">
                    <div>
                        <h3 class="text-white font-bold text-[10px] uppercase tracking-[0.2em] mb-4">Filters & Lenses</h3>
                        <div class="space-y-2">
                            <button onclick="setFilter('none')" id="filter-btn-none" class="w-full flex justify-between p-4 rounded-2xl bg-white/5 active-ring">
                                <span class="text-[10px] font-bold uppercase">Natural</span>
                            </button>
                            <button onclick="setFilter('pokkie')" id="filter-btn-pokkie" class="w-full flex justify-between p-4 rounded-2xl bg-pink-500/10 border border-pink-500/20">
                                <span class="text-[10px] font-bold uppercase text-pink-400">✨ Pokkie Filter</span>
                            </button>
                            <button onclick="setFilter('cyber')" id="filter-btn-cyber" class="w-full flex justify-between p-4 rounded-2xl bg-white/5">
                                <span class="text-[10px] font-bold uppercase">Cyberpunk</span>
                            </button>
                            <button onclick="setFilter('noir')" id="filter-btn-noir" class="w-full flex justify-between p-4 rounded-2xl bg-white/5">
                                <span class="text-[10px] font-bold uppercase">Noir Classic</span>
                            </button>
                            <button onclick="setFilter('glow')" id="filter-btn-glow" class="w-full flex justify-between p-4 rounded-2xl bg-white/5">
                                <span class="text-[10px] font-bold uppercase">Soft Radiance</span>
                            </button>
                        </div>
                    </div>

                    <div class="p-5 rounded-2xl bg-amber-500/10 border border-amber-500/20">
                        <p class="text-[10px] font-bold text-amber-500 uppercase mb-2">📸 Auto-Capture</p>
                        <p class="text-[10px] text-zinc-400 leading-relaxed">• Smile to trigger photo timer<br>• Real-time Face Tracking</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const CONFIG = {
            faceModel: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
            wasm: "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        };

        let faceLandmarker;
        let scene, camera, renderer, glasses;
        let activeStyle = 'aviator';
        let activeFilter = 'none';
        let isCapturing = false;

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const loadingOverlay = document.getElementById("loading-overlay");
        const loadingMsg = document.getElementById("loading-msg");
        const retryBtn = document.getElementById("retry-btn");
        const loaderIcon = document.getElementById("loader-icon");

        async function init() {
            try {
                setupScene();
                const vision = await FilesetResolver.forVisionTasks(CONFIG.wasm);
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: CONFIG.faceModel, delegate: "GPU" },
                    runningMode: "VIDEO", outputFaceBlendshapes: true
                });
                await startCamera();
            } catch (err) { 
                console.error("Initialization error:", err);
                showError("System Failure during startup.");
            }
        }

        function showError(msg) {
            loadingMsg.innerText = msg;
            loadingMsg.classList.replace('text-blue-500', 'text-red-500');
            loaderIcon.classList.add('hidden');
            retryBtn.classList.remove('hidden');
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, video.clientWidth / video.clientHeight || 16/9, 0.1, 100);
            camera.position.z = 5;
            
            renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, preserveDrawingBuffer: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            
            scene.add(new THREE.AmbientLight(0xffffff, 1.8));
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(0, 5, 5);
            scene.add(light);
            
            createGlasses();
        }

        function createGlasses() {
            if (glasses) scene.remove(glasses);
            if (activeStyle === 'none') return;
            
            glasses = new THREE.Group();
            const colorMap = {
                aviator: 0xFCD34D,
                wayfarer: 0x18181b,
                retro: 0xA16207,
                sport: 0x3b82f6,
                cat: 0xEC4899
            };
            
            const frameColor = colorMap[activeStyle] || 0x18181b;
            const frameMat = new THREE.MeshPhongMaterial({ color: frameColor, shininess: 150 });
            const lensMat = new THREE.MeshPhongMaterial({ 
                color: 0x111111, 
                transparent: true, 
                opacity: 0.85, 
                shininess: 200 
            });

            if (activeStyle === 'aviator') {
                const lensGeom = new THREE.CircleGeometry(0.32, 32);
                const frameGeom = new THREE.TorusGeometry(0.32, 0.02, 16, 50);
                const f1 = new THREE.Mesh(frameGeom, frameMat); f1.position.x = -0.4;
                const f2 = f1.clone(); f2.position.x = 0.4;
                const l1 = new THREE.Mesh(lensGeom, lensMat); l1.position.set(-0.4, 0, 0.01);
                const l2 = l1.clone(); l2.position.x = 0.4;
                const bridge = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.3), frameMat);
                bridge.rotation.z = Math.PI/2; bridge.position.y = 0.1;
                glasses.add(f1, f2, l1, l2, bridge);
            } else if (activeStyle === 'wayfarer' || activeStyle === 'sport') {
                const frameGeom = new THREE.BoxGeometry(1.2, 0.1, 0.1);
                const frame = new THREE.Mesh(frameGeom, frameMat);
                const l1 = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.35, 0.05), lensMat);
                l1.position.set(-0.35, -0.1, 0.05);
                const l2 = l1.clone(); l2.position.x = 0.35;
                glasses.add(frame, l1, l2);
            } else if (activeStyle === 'retro') {
                const lensGeom = new THREE.CircleGeometry(0.28, 32);
                const frameGeom = new THREE.TorusGeometry(0.28, 0.04, 16, 50);
                const f1 = new THREE.Mesh(frameGeom, frameMat); f1.position.x = -0.35;
                const f2 = f1.clone(); f2.position.x = 0.35;
                const l1 = new THREE.Mesh(lensGeom, lensMat); l1.position.set(-0.35, 0, 0.01);
                const l2 = l1.clone(); l2.position.x = 0.35;
                const bridge = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.02, 8, 16, Math.PI), frameMat);
                bridge.position.y = 0.05;
                glasses.add(f1, f2, l1, l2, bridge);
            } else if (activeStyle === 'cat') {
                const shape = new THREE.Shape();
                shape.moveTo(-0.1, 0); shape.lineTo(-0.5, 0.3); shape.lineTo(-0.4, -0.2); shape.lineTo(-0.1, -0.1);
                const lensGeom = new THREE.ShapeGeometry(shape);
                const l1 = new THREE.Mesh(lensGeom, lensMat); l1.position.x = -0.05;
                const l2 = l1.clone(); l2.scale.x = -1; l2.position.x = 0.05;
                const bridge = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.1), frameMat);
                bridge.rotation.z = Math.PI/2;
                glasses.add(l1, l2, bridge);
                glasses.position.y = 0.1;
            }
            
            scene.add(glasses);
        }

        async function startCamera() {
            if (video.srcObject) {
                const tracks = video.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                video.srcObject = null;
                await new Promise(resolve => setTimeout(resolve, 300));
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } 
                });
                
                video.srcObject = stream;
                
                return new Promise((resolve, reject) => {
                    video.onloadedmetadata = () => {
                        video.play().then(() => {
                            loadingOverlay.style.opacity = '0';
                            setTimeout(() => loadingOverlay.style.display = 'none', 500);
                            resize();
                            loop();
                            resolve();
                        }).catch(e => {
                            console.error("Play error:", e);
                            showError("System blocked video playback.");
                            reject(e);
                        });
                    };
                });
            } catch (e) {
                console.error("Camera error:", e);
                showError("Camera Access Required for VisionAR.");
            }
        }

        function loop() {
            const timestamp = performance.now();
            if (video.readyState >= 2) {
                const faceResults = faceLandmarker.detectForVideo(video, timestamp);
                
                if (faceResults.faceLandmarks?.[0] && glasses) {
                    const head = faceResults.faceLandmarks[0];
                    const bridge = head[168]; 
                    
                    const tx = (bridge.x - 0.5) * 8; 
                    const ty = -(bridge.y - 0.5) * 6;
                    const tz = (bridge.z) * -10; 
                    
                    glasses.position.x = tx;
                    glasses.position.y = ty;
                    glasses.position.z = tz;
                    
                    const leftEye = head[33];
                    const rightEye = head[263];
                    const chin = head[152];
                    const forehead = head[10];

                    const roll = -Math.atan2(rightEye.y - leftEye.y, rightEye.x - leftEye.x);
                    const pitch = (forehead.z - chin.z) * 1.5;
                    const yaw = (leftEye.z - rightEye.z) * 1.5;

                    glasses.rotation.set(pitch, yaw, roll);
                    glasses.visible = true;

                    // Check for Smile Blendshape
                    if (faceResults.faceBlendshapes?.[0] && !isCapturing) {
                        const shapes = faceResults.faceBlendshapes[0].categories;
                        const smileLeft = shapes.find(c => c.categoryName === 'mouthSmileLeft')?.score || 0;
                        const smileRight = shapes.find(c => c.categoryName === 'mouthSmileRight')?.score || 0;
                        
                        if (smileLeft > 0.4 && smileRight > 0.4) {
                            startCountdown();
                        }
                    }
                } else if (glasses) {
                    glasses.visible = false;
                }

                renderer.render(scene, camera);
            }
            requestAnimationFrame(loop);
        }

        function startCountdown() {
            isCapturing = true;
            let timeRemaining = 3;
            const el = document.getElementById('gesture-timer');
            const container = document.getElementById('video-container');
            
            el.innerText = timeRemaining;
            el.style.opacity = '1';
            container.classList.add('targeting');
            
            const timer = setInterval(() => {
                timeRemaining--;
                if (timeRemaining > 0) {
                    el.innerText = timeRemaining;
                } else {
                    clearInterval(timer);
                    el.style.opacity = '0';
                    container.classList.remove('targeting');
                    window.takePhoto();
                    setTimeout(() => { isCapturing = false; }, 3000); // 3s cool down before next auto-snap
                }
            }, 1000);
        }

        window.takePhoto = () => {
            const flash = document.getElementById('flash');
            flash.classList.add('flash-anim');
            setTimeout(() => flash.classList.remove('flash-anim'), 400);

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth || 1280;
            tempCanvas.height = video.videoHeight || 720;
            const ctx = tempCanvas.getContext('2d');

            if (activeFilter === 'noir') ctx.filter = 'grayscale(1) contrast(1.8)';
            if (activeFilter === 'glow') ctx.filter = 'brightness(1.1) saturate(1.2) sepia(0.1)';
            if (activeFilter === 'cyber') ctx.filter = 'contrast(1.5) hue-rotate(280deg)';
            if (activeFilter === 'pokkie') ctx.filter = 'saturate(1.3) sepia(0.25) contrast(0.95) brightness(1.05)';

            ctx.save();
            ctx.scale(-1, 1);
            ctx.translate(-tempCanvas.width, 0);
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
            ctx.restore();

            if (activeFilter === 'pokkie') {
                ctx.fillStyle = 'rgba(255, 180, 150, 0.15)';
                ctx.globalCompositeOperation = 'soft-light';
                ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                ctx.globalCompositeOperation = 'source-over';
            }

            ctx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);

            const dataUrl = tempCanvas.toDataURL('image/png');
            document.getElementById('last-photo-preview').classList.remove('hidden');
            document.getElementById('preview-img').src = dataUrl;
            document.getElementById('download-link').href = dataUrl;
        };

        window.setFilter = (f) => {
            activeFilter = f;
            document.getElementById('ar-viewport-container').className = `relative aspect-video rounded-[2.5rem] overflow-hidden bg-zinc-950 filter-${f}`;
            document.querySelectorAll('[id^="filter-btn-"]').forEach(b => b.classList.remove('active-ring'));
            document.getElementById(`filter-btn-${f}`).classList.add('active-ring');
        };

        window.changeStyle = (s) => {
            activeStyle = s;
            createGlasses();
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('active-ring'));
            document.getElementById(`btn-${s}`).classList.add('active-ring');
        };

        function resize() {
            const container = document.getElementById('ar-viewport-container');
            if (!container) return;
            const w = container.clientWidth;
            const h = container.clientHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }

        window.addEventListener('resize', resize);
        window.addEventListener('load', init);
    </script>
</body>
</html>
